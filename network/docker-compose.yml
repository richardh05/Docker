networks:
  proxy-public:
    external: true

services:
  traefik:
    image: traefik:v3.7
    container_name: traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Since this is Tailscale-only, your public router ports 80/443 remain closed.
    # Traefik will listen internally on your host machine (and thus your Tailscale IP).
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NAMECOM_USERNAME=${NAMEDOTCOM_API_EMAIL}
      - NAMECOM_API_TOKEN=${NAMEDOTCOM_API_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt # Certificate storage location
    networks:
      - proxy-public
    command:
      - "--global.checknewversion=false"
      - "--global.sendanonymoususage=false"
      - "--log.level=DEBUG"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy-public"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # Enforce universal SSL/HTTPS redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      # Configure Let's Encrypt DNS Challenge via Name.com
      - "--entrypoints.websecure.http.tls.domains[0].main=richard-hughes.dev"
      - "--entrypoints.websecure.http.tls.domains[0].sans=*.richard-hughes.dev"
      - "--certificatesresolvers.namedotcom-resolver.acme.dnschallenge=true"
      - "--certificatesresolvers.namedotcom-resolver.acme.dnschallenge.provider=namedotcom"
      - "--certificatesresolvers.namedotcom-resolver.acme.email=${NAMEDOTCOM_API_EMAIL}"
      - "--certificatesresolvers.namedotcom-resolver.acme.storage=/letsencrypt/acme.json"
  adguardhome:
    image: adguard/adguardhome:latest
    container_name: adguardhome
    restart: unless-stopped
    command: [ "--web-addr", "0.0.0.0:3000" ]
    labels:
      glance.name: AdGuard Home
      glance.icon: si:adguard
      glance.description: Adblock & DNS
      glance.category: System
      glance.url: http://${URL}:3001
    ports:
      - "53:53/tcp"   # DNS over TCP
      - "53:53/udp"   # DNS over UDP
      - "67:67/udp"   # DHCP Server (optional)
      # - "80:80/tcp"   # HTTP Web Interface
      # - "443:443/tcp" # HTTPS Web Interface
      - "853:853/tcp" # DNS-over-TLS
      - "3001:3000/tcp" # Initial Setup API
    volumes:
      - ./work:/opt/adguardhome/work
      - ./conf:/opt/adguardhome/conf

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    labels:
      glance.name: Tailscale
      glance.icon: si:tailscale
      glance.description: VPN
      glance.category: System
      glance.url: https://login.tailscale.com/admin/machines
    hostname: barry
    network_mode: "host"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_EXTRA_ARGS=--advertise-tags=tag:server  # Optional: for ACLs
    volumes:
      - ${DATA}/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    # The official image's entrypoint handles login if TS_AUTHKEY is present
    restart: unless-stopped
    
  samba:
    image: ghcr.io/servercontainers/samba:smbd-wsdd2-latest
    container_name: samba
    labels:
      glance.name: Samba
      glance.icon: si:protondrive
      glance.description: Network Storage
      glance.category: Productivity
      glance.url: smb://${URL}/Media
    network_mode: host
    environment:
      SAMBA_GLOBAL_CONFIG_workgroup: WORKGROUP
      ACCOUNT_richard: ${SAMBA_PASSWORD}
      UID_richard: ${PUID}
      GROUPS_richard: ${PGID}

      ACCOUNT_person: ${SAMBA_PASSWORD}
      UID_person: ${PUID}
      GROUPS_person: ${PGID}

      SAMBA_VOLUME_CONFIG_media: >
        [Media];
        path=/shares/media;
        guest ok = no;
        read only = no;
        browseable = yes;
        writable = yes;
        force user = richard;
        valid users = richard, person
    volumes:
      - ${MEDIA}:/shares/media
    restart: unless-stopped
